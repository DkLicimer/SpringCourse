services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arakhley_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-arakhley_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DEBUG=True
      - LANG=ru_RU.UTF-8
      - LC_ALL=ru_RU.UTF-8
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80" 
    depends_on:
      - backend

volumes:
  postgres_data:
  media_volume: