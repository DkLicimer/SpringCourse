stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"

.backend-cache: &backend-cache
  cache:
    key:
      files:
        - backend/requirements.txt
    paths:
      - .cache/pip

.frontend-cache: &frontend-cache
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/

# ==================== СТАДИЯ ТЕСТИРОВАНИЯ (TEST) ====================

test-backend:
  stage: test
  image: python:3.11-slim
  <<: *backend-cache
  before_script:
    - export PIP_CACHE_DIR="${CI_PROJECT_DIR}/.cache/pip"
  script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - python manage.py check

test-frontend:
  stage: test
  image: node:18-alpine
  <<: *frontend-cache
  script:
    - cd frontend
    - npm ci
    - npm run build

# ==================== СТАДИЯ СБОРКИ (BUILD) ====================

build-images:
  stage: build
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  only:
    - main
    - master
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --pull -t "$BACKEND_IMAGE:latest" -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" ./backend
    - docker push "$BACKEND_IMAGE:latest"
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - docker build --pull -t "$FRONTEND_IMAGE:latest" -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" ./frontend
    - docker push "$FRONTEND_IMAGE:latest"
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"

# ==================== СТАДИЯ ДЕПЛОЯ (DEPLOY) ====================

deploy-to-server:
  stage: deploy
  image: alpine:latest
  only:
    - main
    - master
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
  script:
    - scp -i ~/.ssh/id_rsa docker-compose.prod.yml $SERVER_USER@$SERVER_HOST:/opt/arakhley-booking/docker-compose.yml
    - |
      ssh -i ~/.ssh/id_rsa $SERVER_USER@$SERVER_HOST "
        cd /opt/arakhley-booking &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker compose pull &&
        docker compose up -d --remove-orphans &&
        docker image prune -f
      "